name: Build and Release Linux Binary

on:
  push:
    tags:
      - 'v*' # Dispara quando você cria uma tag começando com 'v' (ex: v1.0)
  workflow_dispatch: # Permite rodar manualmente se precisar

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Necessário para criar a Release no GitHub

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependências do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3-dev

      - name: Instalar dependências Python
        run: |
          pip install nuitka pandas mysql-connector-python numpy
          pip install -r requirements.txt

      - name: Compilar com Nuitka
        run: |
          python -m nuitka --onefile --standalone --output-dir=dist main.py
          # Renomeia para algo mais limpo (opcional)
          mv dist/main.bin dist/dct-srbc-linux

      - name: Criar GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/dct-srbc-linux
          body: "Compilação automática do script para Linux (BDSBH23/DCT-SRBC)."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}