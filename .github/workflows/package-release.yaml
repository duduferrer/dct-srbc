name: Build and Release Linux Binary (Legacy Support)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # Permite execução manual

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Permissão para criar a Release

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Compilar no Container Manylinux (Compatibilidade Total)
        #manylinux2014 para garantir suporte ao Ubuntu 14.04 (GLIBC antiga)
        run: |
          docker run --rm -v ${{ github.workspace }}:/io quay.io/pypa/manylinux2014_x86_64 /bin/bash -c "
            # 1. Extrair as bibliotecas estáticas exigidas pelo Nuitka no Manylinux
            cd /opt/_internal && tar xf static-libs-for-embedding-only.tar.xz && cd /io
          
            # 2. Instalar dependências (incluindo as novas que você adicionou como openpyxl e dotenv)
            /opt/python/cp312-cp312/bin/pip install nuitka pandas mysql-connector-python numpy zstandard openpyxl python-dotenv questionary
          
            # 3. Compilar com Nuitka corrigindo plugins e localização
            /opt/python/cp312-cp312/bin/python -m nuitka \
              --onefile \
              --standalone \
              --static-libpython=yes \
              --include-package=mysql.connector \
              --include-package-data=mysql.connector \
              --collect-all=mysql \
              --output-dir=/io/dist \
              /io/main.py
          
            # 4. Ajustar nome e permissões
            if [ -f /io/dist/main.bin ]; then
              mv /io/dist/main.bin /io/dist/dct-srbc-linux
              chown $(id -u):$(id -g) /io/dist/dct-srbc-linux
            else
              echo 'Erro: Binário não encontrado!' && exit 1
            fi
          "

      - name: Criar GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/dct-srbc-linux
          body: |
            ### Release DCT-SRBC
            Compilação automática otimizada para kernels antigos (Ubuntu 14.04+).
            - **Versão:** ${{ github.ref_name }}
            - **Sistema Alvo:** Linux x86_64 (Legacy GLIBC)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}