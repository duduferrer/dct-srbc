name: Build and Release Linux Binary (Legacy Support)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Compilar com Nuitka no Container Manylinux (Compatibilidade GLIBC 2.17+)
        run: |
          docker run --rm -v ${{ github.workspace }}:/io quay.io/pypa/manylinux2014_x86_64 /bin/bash -c "
            set -e
 
            # ----------------------------------------------------------------
            # 1. Ferramentas de sistema necessárias para o Nuitka compilar C
            # ----------------------------------------------------------------
            yum install -y gcc gcc-c++ make patchelf
 
            # ----------------------------------------------------------------
            # 2. Extrair libs estáticas do Python do manylinux
            #    Obrigatório para que --static-libpython=yes funcione.
            #    Sem isso, o Nuitka falha ao tentar embutir o Python no binário.
            # ----------------------------------------------------------------
            cd /opt/_internal && tar xf static-libs-for-embedding-only.tar.xz && cd /io
 
            # ----------------------------------------------------------------
            # 3. Definir qual Python usar
            #    cp312 tem as static libs disponíveis no manylinux2014
            # ----------------------------------------------------------------
            PY=/opt/python/cp312-cp312/bin/python3
            PIP=/opt/python/cp312-cp312/bin/pip
 
            # ----------------------------------------------------------------
            # 4. Instalar dependências
            #    - ordered-set: recomendado pelo Nuitka para melhor performance
            #    - zstandard: necessário para compressão do onefile
            #    - demais: dependências do projeto
            # ----------------------------------------------------------------
            \$PIP install --upgrade pip
            \$PIP install \
              nuitka \
              ordered-set \
              zstandard \
              pandas \
              mysql-connector-python \
              numpy \
              openpyxl \
              python-dotenv \
              questionary
 
            # ----------------------------------------------------------------
            # 5. Compilar com Nuitka
            #
            # --onefile            : gera um único binário autoextraível
            # --standalone         : inclui todas as dependências Python
            # --static-libpython=yes: embute o Python estaticamente,
            #                        eliminando dependência de libpython.so
            #                        no sistema alvo (crucial para Ubuntu 14)
            # --assume-yes-for-downloads: evita que o Nuitka trave esperando
            #                        confirmação para baixar o backend C
            #
            # mysql.connector.plugins : carregados dinamicamente em runtime,
            #                          o Nuitka não os detecta automaticamente
            # mysql.connector.locales : dados de locale exigidos em runtime
            # mysql.connector         : pacote principal e submódulos
            #
            # ATENÇÃO: não usar --include-package=mysql pois isso tentaria
            # importar mysql.ai.ml que exige scikit-learn e causaria erro
            # ----------------------------------------------------------------
            cd /io && \$PY -m nuitka \
              --onefile \
              --standalone \
              --static-libpython=yes \
              --assume-yes-for-downloads \
              --output-dir=/io/dist \
              --include-package=mysql.connector \
              --include-package=mysql.connector.plugins \
              --include-package=mysql.connector.locales \
              --include-package-data=mysql.connector \
              --include-package=pandas \
              --include-package=numpy \
              --include-package=openpyxl \
              --include-package=questionary \
              --include-package=dotenv \
              /io/main.py
 
            # ----------------------------------------------------------------
            # 6. Renomear binário e ajustar permissões
            #    No Linux, Nuitka gera main.bin (não main)
            # ----------------------------------------------------------------
            if [ -f /io/dist/main.bin ]; then
              mv /io/dist/main.bin /io/dist/dct-srbc-linux
              chmod +x /io/dist/dct-srbc-linux
              chown \$(id -u):\$(id -g) /io/dist/dct-srbc-linux
              echo 'Build concluído com sucesso!'
              ls -lh /io/dist/dct-srbc-linux
            else
              echo 'ERRO: Binário não encontrado. Conteúdo de /io/dist/:'
              ls -la /io/dist/ || echo '/io/dist/ não existe'
              exit 1
            fi
          "

      - name: Criar GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/dct-srbc-linux
          body: |
            ### Release DCT-SRBC
            Compilação automática otimizada para kernels antigos (Ubuntu 14.04+).
            - **Versão:** ${{ github.ref_name }}
            - **Sistema Alvo:** Linux x86_64 (Legacy GLIBC 2.17+)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}